<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bot WhatsApp - Test Hostinger</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Segoe UI', Arial, sans-serif; 
      background: linear-gradient(135deg, #0B121A 0%, #1A1A2E 50%, #16213E 100%); 
      color: white; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      padding: 20px;
    }
    .container { 
      text-align: center; 
      padding: 40px; 
      background: rgba(255,255,255,0.05); 
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      max-width: 500px;
      width: 100%;
    }
    h1 { 
      font-size: 1.8em; 
      margin-bottom: 20px;
      background: linear-gradient(90deg, #00D4AA, #7C3AED);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #qr { 
      max-width: 280px; 
      margin: 20px auto; 
      border-radius: 10px;
      background: white;
      padding: 10px;
    }
    .status { 
      padding: 12px 24px; 
      border-radius: 10px; 
      margin: 15px 0;
      font-weight: bold;
      transition: all 0.3s;
    }
    .waiting { 
      background: rgba(243, 156, 18, 0.2); 
      border: 1px solid #f39c12;
      color: #f39c12;
    }
    .connected { 
      background: rgba(39, 174, 96, 0.2); 
      border: 1px solid #27ae60;
      color: #27ae60;
    }
    .error { 
      background: rgba(231, 76, 60, 0.2); 
      border: 1px solid #e74c3c;
      color: #e74c3c;
    }
    .loading {
      background: rgba(52, 152, 219, 0.2);
      border: 1px solid #3498db;
      color: #3498db;
    }
    #messages {
      margin-top: 20px;
      text-align: left;
      max-height: 200px;
      overflow-y: auto;
      padding: 10px;
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
      display: none;
    }
    #messages.show { display: block; }
    .msg {
      padding: 8px 12px;
      margin: 5px 0;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      font-size: 0.9em;
      word-break: break-all;
    }
    .msg .from { color: #00D4AA; font-weight: bold; }
    .diagnostics {
      margin-top: 20px;
      text-align: left;
      padding: 15px;
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
      font-family: monospace;
      font-size: 0.8em;
      max-height: 300px;
      overflow-y: auto;
    }
    .diagnostics h3 {
      color: #00D4AA;
      margin-bottom: 10px;
    }
    .log-line {
      padding: 3px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.7);
    }
    .log-line.error { color: #e74c3c; }
    .info {
      margin-top: 20px;
      font-size: 0.85em;
      color: rgba(255,255,255,0.5);
    }
    #server-info {
      margin-top: 15px;
      padding: 10px;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      font-size: 0.85em;
      text-align: left;
    }
    #server-info div { margin: 5px 0; }
    #server-info span { color: #00D4AA; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🤖 Bot WhatsApp Test</h1>
    <div id="status" class="status loading">Conectando al servidor...</div>
    <img id="qr" src="" alt="QR Code" style="display:none;">
    <div id="server-info"></div>
    <div id="messages"></div>
    <div class="diagnostics" id="logs" style="display:none;">
      <h3>📋 Logs del servidor</h3>
      <div id="log-content"></div>
    </div>
    <div class="info">Hostinger Node.js Test</div>
    <button onclick="fetch('/status').then(r=>r.json()).then(d=>{document.getElementById('logs').style.display='block';document.getElementById('log-content').innerHTML=d.logs.map(l=>'<div class=log-line>'+l+'</div>').join('');document.getElementById('server-info').innerHTML='<div>Node: <span>'+d.node+'</span></div><div>Platform: <span>'+d.platform+'</span></div><div>Memory: <span>'+d.memory+'</span></div><div>Uptime: <span>'+Math.round(d.uptime)+'s</span></div><div>WhatsApp: <span>'+d.whatsappStatus+'</span></div>';})" style="margin-top:15px;padding:10px 20px;background:rgba(0,212,170,0.2);border:1px solid #00D4AA;color:#00D4AA;border-radius:8px;cursor:pointer;font-size:0.9em;">🔍 Diagnosticar</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const qrImg = document.getElementById('qr');
    const statusDiv = document.getElementById('status');
    const messagesDiv = document.getElementById('messages');
    
    function setStatus(text, type) {
      statusDiv.textContent = text;
      statusDiv.className = 'status ' + type;
    }
    
    socket.on('connect', () => {
      console.log('Conectado al servidor');
      setStatus('Conectado al servidor, esperando WhatsApp...', 'loading');
    });
    
    socket.on('connect_error', (err) => {
      console.error('Error de conexion:', err);
      setStatus('Error de conexion: ' + err.message, 'error');
    });
    
    socket.on('status', (s) => {
      console.log('Status:', s);
      if (s === 'ready') {
        setStatus('WhatsApp Conectado!', 'connected');
        qrImg.style.display = 'none';
        messagesDiv.classList.add('show');
      } else if (s === 'qr') {
        setStatus('Escanea el QR con WhatsApp', 'waiting');
      } else if (s === 'starting') {
        setStatus('Iniciando WhatsApp...', 'loading');
      }
    });
    
    socket.on('qr', (qr) => {
      qrImg.src = qr;
      qrImg.style.display = 'block';
      setStatus('Escanea el QR con WhatsApp', 'waiting');
    });
    
    socket.on('ready', () => {
      qrImg.style.display = 'none';
      setStatus('WhatsApp Conectado!', 'connected');
      messagesDiv.classList.add('show');
    });
    
    socket.on('authenticated', () => {
      setStatus('Autenticado! Conectando...', 'connected');
    });
    
    socket.on('auth_failure', (msg) => {
      setStatus('Error de autenticacion: ' + msg, 'error');
    });
    
    socket.on('disconnected', (reason) => {
      setStatus('Desconectado: ' + reason, 'error');
    });
    
    socket.on('message', (msg) => {
      messagesDiv.classList.add('show');
      const div = document.createElement('div');
      div.className = 'msg';
      div.innerHTML = '<span class="from">' + msg.from + '</span>: ' + msg.body;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });
  </script>
</body>
</html>
