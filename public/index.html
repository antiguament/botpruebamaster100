<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bot WhatsApp - Test Hostinger</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Segoe UI', Arial, sans-serif; 
      background: linear-gradient(135deg, #0B121A 0%, #1A1A2E 50%, #16213E 100%); 
      color: white; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      padding: 20px;
    }
    .container { 
      text-align: center; 
      padding: 40px; 
      background: rgba(255,255,255,0.05); 
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      max-width: 400px;
      width: 100%;
    }
    h1 { 
      font-size: 1.8em; 
      margin-bottom: 20px;
      background: linear-gradient(90deg, #00D4AA, #7C3AED);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #qr { 
      max-width: 280px; 
      margin: 20px auto; 
      border-radius: 10px;
      background: white;
      padding: 10px;
    }
    .status { 
      padding: 12px 24px; 
      border-radius: 10px; 
      margin: 15px 0;
      font-weight: bold;
      transition: all 0.3s;
    }
    .waiting { 
      background: rgba(243, 156, 18, 0.2); 
      border: 1px solid #f39c12;
      color: #f39c12;
    }
    .connected { 
      background: rgba(39, 174, 96, 0.2); 
      border: 1px solid #27ae60;
      color: #27ae60;
    }
    .error { 
      background: rgba(231, 76, 60, 0.2); 
      border: 1px solid #e74c3c;
      color: #e74c3c;
    }
    .loading {
      background: rgba(52, 152, 219, 0.2);
      border: 1px solid #3498db;
      color: #3498db;
    }
    #messages {
      margin-top: 20px;
      text-align: left;
      max-height: 200px;
      overflow-y: auto;
      padding: 10px;
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
      display: none;
    }
    #messages.show { display: block; }
    .msg {
      padding: 8px 12px;
      margin: 5px 0;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      font-size: 0.9em;
      word-break: break-all;
    }
    .msg .from { color: #00D4AA; font-weight: bold; }
    .info {
      margin-top: 20px;
      font-size: 0.85em;
      color: rgba(255,255,255,0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🤖 Bot WhatsApp Test</h1>
    <div id="status" class="status loading">Iniciando servidor...</div>
    <img id="qr" src="" alt="QR Code" style="display:none;">
    <div id="messages"></div>
    <div class="info">Hostinger Node.js Test</div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const qrImg = document.getElementById('qr');
    const statusDiv = document.getElementById('status');
    const messagesDiv = document.getElementById('messages');
    
    function setStatus(text, type) {
      statusDiv.textContent = text;
      statusDiv.className = 'status ' + type;
    }
    
    socket.on('connect', () => {
      console.log('Conectado al servidor');
    });
    
    socket.on('status', (s) => {
      if (s === 'ready') {
        setStatus('✅ WhatsApp Conectado!', 'connected');
        qrImg.style.display = 'none';
        messagesDiv.classList.add('show');
      } else if (s === 'qr') {
        setStatus('Escanea el QR con WhatsApp', 'waiting');
      } else if (s === 'starting') {
        setStatus('Iniciando WhatsApp...', 'loading');
      }
    });
    
    socket.on('qr', (qr) => {
      qrImg.src = qr;
      qrImg.style.display = 'block';
      setStatus('Escanea el QR con WhatsApp', 'waiting');
    });
    
    socket.on('ready', () => {
      qrImg.style.display = 'none';
      setStatus('✅ WhatsApp Conectado!', 'connected');
      messagesDiv.classList.add('show');
    });
    
    socket.on('authenticated', () => {
      setStatus('✅ Autenticado! Conectando...', 'connected');
    });
    
    socket.on('auth_failure', (msg) => {
      setStatus('❌ Error de autenticación', 'error');
    });
    
    socket.on('disconnected', (reason) => {
      setStatus('⚠️ Desconectado: ' + reason, 'error');
    });
    
    socket.on('message', (msg) => {
      messagesDiv.classList.add('show');
      const div = document.createElement('div');
      div.className = 'msg';
      div.innerHTML = '<span class="from">' + msg.from + '</span>: ' + msg.body;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });
  </script>
</body>
</html>
